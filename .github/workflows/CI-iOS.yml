# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift
name: CI-iOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: macos-26-xlarge

    timeout-minutes: 8

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_26.5.app

    - name: Xcode version
      run: /usr/bin/xcodebuild -version

    - name: Build and Test
      run: xcodebuild clean build test -project SocialFeed.xcodeproj -scheme "CI_iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO -sdk iphonesimulator -destination "platform=iOS Simulator,name=iPhone 17,OS=26.5" -enableThreadSanitizer YES ONLY_ACTIVE_ARCH=YES